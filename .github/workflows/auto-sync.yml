name: Auto Sync to Property Dealer Hisar

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Check Current Branch
        run: |
          git branch
          git status

      - name: Check Remote Access
        run: |
          git ls-remote https://x-access-token:${{ secrets.PROPERTY_DEALER_HISAR_TOKEN }}@github.com/propertydealerhisar/Property_Dealer_In_Hisar.git

      - name: Push to Hisar Repo
        run: |
          git push --force https://x-access-token:${{ secrets.PROPERTY_DEALER_HISAR_TOKEN }}@github.com/propertydealerhisar/Property_Dealer_In_Hisar.git HEAD:main




















